<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Movie Collection</title>
        
        <style>
            body {
            font-family: Inter, system-ui, sans-serif;
            background: #0f172a;
            padding: 30px 20px;
            margin: 0;
            color: #e5e7eb;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .movie-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        article {
            background: #f8fafc;
            color: #1e293b;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        
        article:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.35);
        }

        article header {
            margin-bottom: 12px;
        }

        h2 {
            color: #0f172a;
            margin: 0;
            text-align: center;
            min-height: 3.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.25;
        }

        
        .poster-wrapper {
            overflow: hidden;
            border-radius: 12px;
            margin: 0 auto 15px auto;
            width: 200px;
        }
        
        img {
            width: 100%;
            max-width: 200px;
            display: block;
            border-radius: 12px;
            transition: transform 0.25s ease, filter 0.25s ease;
            transform-origin: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        
        .poster-wrapper:hover img {
            transform: scale(1.08);
            filter: brightness(1.15);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }
        
        .meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-top: -6px;
            margin-bottom: 4px;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 600;
        }
        
        .meta dt {
            margin: 0;
            color: #64748b;
            font-weight: 700;
        }

        .meta dd,
        .meta time {
            margin: 0;
            color: #64748b;
            font-weight: 400;
        }

        .separator {
            margin: 0 4px;
            color: #64748b;
        }

        .overview,
        .details {
            display: flex;
            flex-direction: column;
        }

        .overview {
            margin-bottom: 10px;
        }

        .section-heading {
            color: #0f172a;
            font-weight: 700;
            margin: 8px 0 6px 0;
        }
        
        .genre-list {
            list-style: none;
            margin: 10px 0 12px 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .genre-list li {
            margin: 0;
        }
        
        .genre {
            background: #ffcc4c;
            color: #1f2937;
            padding: 6px 12px;
            border-radius: 999px;
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 700;
        }
        
        .plot {
            background: #e2e8f0;
            color: #475569;
            padding: 12px 12px 30px 12px;
            border-radius: 10px;
            margin-top: 8px;
            margin-bottom: 14px;
            height: 120px;
            overflow-y: auto;
            overflow-x: hidden;
            line-height: 1.5;
            box-sizing: border-box;
        }
        
        .credits {
            margin-top: 8px;
        }
        
        .credit-block {
            margin-bottom: 8px;
        }
        
        .info-label {
            color: #0f172a;
            font-weight: 700;
            display: block;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        
        .credit-block ul {
            margin: 0 0 14px 14px;
            padding-left: 12px;
            color: #475569;
        }
        
        .credit-block li {
            margin-bottom: 2px;
            font-size: 0.92rem;
        }
        
        .ratings-section {
            margin-top: auto;
            padding-top: 10px;
        }

        .ratings {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ratings span {
            background: #e5e7eb;
            color: #111827;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        } 
    </style>  

    <script> 
         window.onload = function () {

            // 1. FETCH DATA
            //Create HTTP request to retrieve movie data from "/movies"
            const xhr = new XMLHttpRequest()
        
            // 2. HELPER FUNCTIONS
            function formatDate(isoDate) {
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
                const date = new Date(isoDate)
                const day = String(date.getDate()).padStart(2, "0")
                const month = months[date.getMonth()]
                const year = date.getFullYear()
                return day + " " + month + " " + year
            }

            // Creates reusable credit block for actors, directors, writers
            function createCreditBlock(labelText, items) {
                const block = document.createElement("section");
                block.className = "credit-block";

                // Section title
                const label = document.createElement("h3");
                label.className = "info-label";
                label.textContent = labelText;

                // List of names
                const list = document.createElement("ul");

                items.forEach(function(item) {
                    const li = document.createElement("li");
                    li.textContent = item;
                    list.append(li);
                });

                block.append(label, list);
                return block;
            }

            // 3. HANDLE RESPONSE
            // Called when data is loaded from server
            xhr.onload = function () {
                const bodyElement = document.body;
            
                if (xhr.status === 200) {
                    const movies = JSON.parse(xhr.responseText);

                    // 4. PAGE SETUP

                    const heading = document.createElement("h1");
                    heading.textContent = "Movie Collection";
                    bodyElement.append(heading);

                    // Main page container for all movie cards
                    const container = document.createElement("main");
                    container.className = "movie-container";
                    bodyElement.append(container);

                    // 5. CREATE MOVIE CARDS

                    movies.forEach(function(movie) {
                        // Each movies is one <article> (semantic container)
                        const article = document.createElement("article");


                        // STRUCTURE (SEMANTIC HTML)
                        // Header -> title
                        const header = document.createElement("header");

                        // Overview -> poster, metadata, genres
                        const overviewSection = document.createElement("div");
                        overviewSection.className = "overview";

                        // Details -> plot and credits
                        const detailsSection = document.createElement("div");
                        detailsSection.className = "details";

                        const creditsSection = document.createElement("section");
                        creditsSection.className = "credits";

                        // Ratings
                        const ratingsSection = document.createElement("div");
                        ratingsSection.className = "ratings-section";

                        // HEADER CONTENT
                        const title = document.createElement("h2");
                        title.textContent = movie.Title;
                        header.append(title);

                        // Poster image
                        const posterWrapper = document.createElement("div");
                        posterWrapper.className = "poster-wrapper";

                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        poster.alt = movie.Title + " poster";

                        posterWrapper.append(poster);
                        overviewSection.append(posterWrapper);

                        // Metadata: Release date + Runtime
                        const meta = document.createElement("dl");
                        meta.className = "meta";

                        const releaseLabel = document.createElement("dt");
                        releaseLabel.textContent = "Release:";

                        const releaseValue = document.createElement("dd");
                        const time = document.createElement("time");
                        time.dateTime = movie.Released;
                        time.textContent = formatDate(movie.Released);
                        releaseValue.append(time);

                        const separator = document.createElement("span");
                        separator.className = "separator";
                        separator.textContent = "|";

                        const runtimeLabel = document.createElement("dt");
                        runtimeLabel.textContent = "Runtime:";

                        const runtimeValue = document.createElement("dd");
                        runtimeValue.textContent = movie.Runtime + " min";
                        
                        meta.append(releaseLabel, releaseValue, separator, runtimeLabel, runtimeValue);
                        overviewSection.append(meta);
                        
  
                        // DETAILS SECTION
                          // Genres (as tags)
                        const genres = document.createElement("ul");
                        genres.className = "genre-list";

                        movie.Genres.forEach(function(genre) {
                            const genreItem = document.createElement("li");

                            const genreSpan = document.createElement("span");
                            genreSpan.className = "genre";
                            genreSpan.textContent = genre;

                            genreItem.append(genreSpan);
                            genres.append(genreItem);
                        })

                        overviewSection.append(genres);
                        
                        // Plot (scrollable)
                        const plotSection = document.createElement("section");

                        const plotHeading = document.createElement("h3");
                        plotHeading.className = "section-heading";
                        plotHeading.textContent = "Plot:";

                        const plot = document.createElement("p");
                        plot.className = "plot";
                        plot.textContent = movie.Plot;

                        plotSection.append(plotHeading, plot);

                        // CREDITS SECTION
                        // Actors, Directors, Writers (reusable function)
                        creditsSection.append(
                            createCreditBlock("Actors:", movie.Actors),
                            createCreditBlock("Directors:", movie.Directors),
                            createCreditBlock("Writers:", movie.Writers)
                        );

                        // RATINGS SECTION
                        const ratings = document.createElement("div");
                        ratings.className = "ratings";

                        const metascore = document.createElement("span");
                        metascore.textContent = "Metascore: " + movie.Metascore;

                        const imdbRating = document.createElement("span");
                        imdbRating.textContent = "IMDb Rating: " + movie.imdbRating;

                        ratings.append(metascore, imdbRating);
                        ratingsSection.append(ratings);


                        // FINAL ASSEMBLY
                        detailsSection.append(plotSection, creditsSection);
                        article.append(header, overviewSection, detailsSection, ratingsSection);
                        container.append(article);
                    });
                } else {
                    bodyElement.append("Data could not be loaded " + xhr.status + " - " + xhr.statusText)
                    }
                }
                xhr.open("GET", "/movies")
                xhr.send()
            }
    </script>
</head>
<body> 
</body>
</html>
